name: Trigger auto deployment for docx2pdfv2

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/docx2pdfv2-AutoDeployTrigger-6c400c3f-7632-4632-b228-2e8bcb3798db.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DOCX2PDFV2_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DOCX2PDFV2_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DOCX2PDFV2_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.DOCX2PDFV2_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DOCX2PDFV2_REGISTRY_PASSWORD }}
          containerAppName: docx2pdfv2
          resourceGroup: E-LMS
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


